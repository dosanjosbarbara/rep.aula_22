<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Dashboard - Data Science</title>
    <style>
        /* CSS BASE - ESTE É O BLOCO QUE ELES VÃO ALTERAR NA BRANCH */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2a2a2a; /* Cor para alterar no modo noturno */
            color: #ffffff;               /* Cor para alterar no modo noturno */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .dashboard-container {
            background-color: rgb(255, 255, 255); /* Cor para alterar no modo noturno */
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgb(255, 255, 255);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #2a2a2a;
            margin-bottom: 20px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .card {
            background: #2a2a2a;
            padding: 15px;
            border-radius: 8px;
        }

        .card-value {
            font-size: 24px;
            font-weight: bold;
            display: block;
        }

        .card-label {
            font-size: 14px;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <h1>Status de Motivação</h1>
        
        <div class="metrics-grid">
            <div class="card">
                <span class="card-value">998%</span>
                <span class="card-label">Vontade de abandonar tudo</span>
            </div>
            <div class="card">
                <span class="card-value">999%</span>
                <span class="card-label">Chances de Desistir</span>
            </div>
        </div>

        <p style="margin-top: 25px; font-size: 12px; color: #2a2a2a;">
            Você quer desistir? <span style="color: rgb(0, 255, 21);">● SIM</span>
        </p>
    </div>

</body>
</html>
